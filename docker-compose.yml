services:
  migrate:
    build:
      context: .
      args:
        # Bakes .env.${ENV} → /app/.env into the image at build time.
        # Set ENV=staging / production in your shell, then `docker compose up --build`.
        ENV: ${ENV:-development}
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://voice:voice@db:5432/voice
    volumes:
      - ./alembic.ini:/app/alembic.ini:ro
      - ./migrations:/app/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      args:
        ENV: ${ENV:-development}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://voice:voice@db:5432/voice
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice -d voice"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
